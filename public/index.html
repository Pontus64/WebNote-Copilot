<!DOCTYPE html>
<html lang="zh-CN">

<head>

    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Floating Notes</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {

            font-family:
                -apple-system,
                BlinkMacSystemFont,
                "PingFang SC",
                sans-serif;

            background: #f5f5f5;
        }

        /* 浮球 */

        .float-btn {

            position: fixed;

            left: 20px;
            top: 20px;

            width: 56px;
            height: 56px;

            border-radius: 50%;

            background: #111;
            color: white;

            display: flex;
            align-items: center;
            justify-content: center;

            cursor: pointer;

            z-index: 1001;

            font-size: 14px;
            font-weight: 600;

            box-shadow:
                0 10px 30px rgba(0, 0, 0, 0.2);

            user-select: none;
        }

        /* 蒙层 */

        .overlay {

            position: fixed;
            inset: 0;

            background: rgba(0, 0, 0, 0.45);

            backdrop-filter: blur(4px);

            opacity: 0;
            pointer-events: none;

            transition: 0.25s;

            z-index: 999;
        }

        .overlay.show {

            opacity: 1;
            pointer-events: auto;
        }

        /* panel */

        .panel {

            position: fixed;

            left: 20px;
            top: 90px;

            width: 50vw;

            background: rgba(255, 255, 255, 0.96);

            border-radius: 20px;

            overflow: hidden;

            box-shadow:
                0 20px 60px rgba(0, 0, 0, 0.2);

            transform: translateY(-20px);

            opacity: 0;
            pointer-events: none;

            transition: 0.25s;

            z-index: 1000;
        }

        .panel.show {

            transform: translateY(0);

            opacity: 1;
            pointer-events: auto;
        }

        /* list */

        #noteList {

            width: 100%;

            display: flex;
            flex-direction: column;
        }

        /* swipe */

        .swipe-item {

            position: relative;

            width: 100%;

            overflow: hidden;

            border-bottom: 1px solid #ececec;

            background: white;
        }

        /* actions */

        .actions {

            position: absolute;

            right: 0;
            top: 0;
            bottom: 0;

            display: flex;
        }

        /* 左滑按钮 */

        .copy-btn,
        .delete-btn {

            width: 72px;

            display: flex;
            align-items: center;
            justify-content: center;

            color: white;

            font-size: 14px;
            font-weight: 600;

            cursor: pointer;

            user-select: none;
        }

        .copy-btn {
            background: #34c759;
        }

        .delete-btn {
            background: #ff3b30;
        }

        /* item */

        .note-item {

            position: relative;

            width: 100%;

            background: white;

            padding: 14px 18px;

            cursor: pointer;

            transition: transform 0.25s ease;

            user-select: none;
        }

        /* title */

        .note-title {

            font-size: 18px;
            font-weight: 700;

            color: #111;

            margin-bottom: 6px;

            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* desc */

        .note-desc {

            font-size: 13px;

            color: #888;

            line-height: 1.5;

            overflow: hidden;

            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
        }

        /* add */

        .add-item {

            height: 52px;

            background: white;

            display: flex;
            align-items: center;
            justify-content: center;

            cursor: pointer;
        }

        .add-circle {

            width: 28px;
            height: 28px;

            border-radius: 50%;

            background: #f2f2f2;

            display: flex;
            align-items: center;
            justify-content: center;

            font-size: 20px;

            color: #777;

            transition: 0.2s;
        }

        .add-item:hover .add-circle {

            background: #111;
            color: white;
        }

        /* detail */

        .detail-page {

            position: fixed;
            inset: 0;

            background: white;

            z-index: 2000;

            transform: translateX(100%);

            transition: 0.3s;

            display: flex;
            flex-direction: column;
        }

        .detail-page.show {

            transform: translateX(0);
        }

        /* header */

        .detail-header {

            height: 64px;

            border-bottom: 1px solid #ececec;

            display: flex;
            align-items: center;

            gap: 12px;

            padding: 0 16px;
        }

        /* back */

        .back-btn {

            width: 34px;
            height: 34px;

            border-radius: 10px;

            background: #f3f3f3;

            display: flex;
            align-items: center;
            justify-content: center;

            cursor: pointer;
        }

        /* title input */

        .detail-title {

            flex: 1;

            border: none;
            outline: none;

            font-size: 20px;
            font-weight: 700;
        }

        /* save */

        .save-btn {

            padding: 8px 14px;

            border-radius: 10px;

            background: #111;

            color: white;

            cursor: pointer;

            font-size: 13px;
        }

        /* content */

        .detail-content {

            flex: 1;

            border: none;
            outline: none;

            resize: none;

            padding: 20px;

            font-size: 16px;

            line-height: 1.8;
        }

        /* 手机 */

        @media (max-width:768px) {

            .panel {

                width: calc(100vw - 40px);
            }
        }
    </style>

</head>

<body>

    <div class="float-btn" id="floatBtn">
        笔记
    </div>

    <div class="overlay" id="overlay"></div>

    <div class="panel" id="panel">

        <div id="noteList"></div>

    </div>

    <div class="detail-page" id="detailPage">

        <div class="detail-header">

            <div class="back-btn" onclick="closeDetail()">
                ←
            </div>

            <input class="detail-title" id="detailTitle" placeholder="输入标题" />

            <div class="save-btn" onclick="saveNote()">
                保存
            </div>

        </div>

        <textarea class="detail-content" id="detailContent" placeholder="输入内容..."></textarea>

    </div>

    <script>

        /* API */

        const API =
            window.location.origin;

        /* 数据 */

        let notes = [];

        let currentIndex = null;

        /* dom */

        const panel =
            document.getElementById("panel");

        const overlay =
            document.getElementById("overlay");

        const noteList =
            document.getElementById("noteList");

        const detailPage =
            document.getElementById("detailPage");

        const detailTitle =
            document.getElementById("detailTitle");

        const detailContent =
            document.getElementById("detailContent");

        /* panel */

        let opened = false;

        document
            .getElementById("floatBtn")
            .addEventListener("click", () => {

                opened = !opened;

                if (opened) {

                    panel.classList.add("show");
                    overlay.classList.add("show");

                } else {

                    panel.classList.remove("show");
                    overlay.classList.remove("show");
                }
            });

        overlay.addEventListener("click", () => {

            opened = false;

            panel.classList.remove("show");
            overlay.classList.remove("show");
        });

        /* fetch */

        async function fetchNotes() {

            const res =
                await fetch(`${API}/notes`);

            notes = await res.json();

            renderNotes();
        }

        /* render */

        function renderNotes() {

            noteList.innerHTML = "";

            notes.forEach((note, index) => {

                const item =
                    document.createElement("div");

                item.className =
                    "swipe-item";

                const actions =
                    document.createElement("div");

                actions.className =
                    "actions";

                const copyBtn =
                    document.createElement("div");

                copyBtn.className =
                    "copy-btn";

                copyBtn.textContent =
                    "复制";

                const deleteBtn =
                    document.createElement("div");

                deleteBtn.className =
                    "delete-btn";

                deleteBtn.textContent =
                    "删除";

                const noteItem =
                    document.createElement("div");

                noteItem.className =
                    "note-item";

                const noteTitle =
                    document.createElement("div");

                noteTitle.className =
                    "note-title";

                noteTitle.textContent =
                    note.title || "未命名";

                const noteDesc =
                    document.createElement("div");

                noteDesc.className =
                    "note-desc";

                noteDesc.textContent =
                    note.content || "";

                actions.append(copyBtn, deleteBtn);
                noteItem.append(noteTitle, noteDesc);
                item.append(actions, noteItem);

                noteList.appendChild(item);

                /* detail */

                noteItem.onclick = () => {

                    openDetail(index);
                };

                /* delete */

                deleteBtn.onclick = () => {

                    deleteNote(index);
                };

                /* copy */

                copyBtn.onclick = () => {

                    copyNote(index);
                };

                /* swipe */

                addSwipe(noteItem);
            });

            /* add */

            const add =
                document.createElement("div");

            add.className = "add-item";

            const addCircle =
                document.createElement("div");

            addCircle.className =
                "add-circle";

            addCircle.textContent =
                "+";

            add.appendChild(addCircle);

            add.onclick = createNote;

            noteList.appendChild(add);
        }

        /* swipe */

        function addSwipe(note) {

            let startX = 0;
            let currentX = 0;

            let isSwiping = false;

            /* 滑动阈值 */

            const threshold = 15;

            note.addEventListener("touchstart", (e) => {

                startX =
                    e.touches[0].clientX;

                currentX = startX;

                isSwiping = false;
            });

            note.addEventListener("touchmove", (e) => {

                currentX =
                    e.touches[0].clientX;

                let diff =
                    currentX - startX;

                /* 超过阈值才算 swipe */

                if (Math.abs(diff) > threshold) {

                    isSwiping = true;
                }

                /* 不是滑动 */

                if (!isSwiping) {
                    return;
                }

                /* 只允许左滑 */

                if (diff < 0) {

                    if (diff < -144) {
                        diff = -144;
                    }

                    note.style.transform =
                        `translateX(${diff}px)`;
                }
            });

            note.addEventListener("touchend", () => {

                /* 不是滑动 */

                if (!isSwiping) {
                    return;
                }

                const moved =
                    currentX - startX;

                if (moved < -60) {

                    note.style.transform =
                        `translateX(-144px)`;

                } else {

                    note.style.transform =
                        `translateX(0px)`;
                }
            });
        }

        /* open */

        function openDetail(index) {

            currentIndex = index;

            detailTitle.value =
                notes[index].title;

            detailContent.value =
                notes[index].content;

            detailPage.classList.add("show");
        }

        /* create */

        function createNote() {

            currentIndex = null;

            detailTitle.value = "";
            detailContent.value = "";

            detailPage.classList.add("show");
        }

        /* close */

        function closeDetail() {

            detailPage.classList.remove("show");
        }

        /* save */

        async function saveNote() {

            const title =
                detailTitle.value.trim();

            const content =
                detailContent.value.trim();

            if (!title) {

                alert("请输入标题");
                return;
            }

            if (currentIndex === null) {

                await fetch(`${API}/notes`, {

                    method: "POST",

                    headers: {
                        "Content-Type": "application/json"
                    },

                    body: JSON.stringify({

                        title,
                        content
                    })
                });

            } else {

                const note =
                    notes[currentIndex];

                await fetch(
                    `${API}/notes/${note.id}`,
                    {

                        method: "PUT",

                        headers: {
                            "Content-Type": "application/json"
                        },

                        body: JSON.stringify({

                            title,
                            content
                        })
                    }
                );
            }

            await fetchNotes();

            closeDetail();
        }

        /* delete */

        async function deleteNote(index) {

            const note =
                notes[index];

            await fetch(
                `${API}/notes/${note.id}`,
                {
                    method: "DELETE"
                }
            );

            await fetchNotes();
        }

        /* copy */

        async function copyNote(index) {

            const oldNote =
                notes[index];

            await fetch(`${API}/notes`, {

                method: "POST",

                headers: {
                    "Content-Type": "application/json"
                },

                body: JSON.stringify({

                    title:
                        oldNote.title + " 副本",

                    content:
                        oldNote.content
                })
            });

            await fetchNotes();
        }

        /* init */

        fetchNotes();

    </script>

</body>

</html>
