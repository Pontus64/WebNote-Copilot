<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Floating Notes</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #111113;
      color: #f4f4f5;
    }

    main {
      width: min(860px, calc(100vw - 40px));
      margin: 0 auto;
      padding: 56px 0 120px;
    }

    .surface {
      padding: 22px;
      border: 1px solid rgba(255, 255, 255, .09);
      border-radius: 14px;
      background: #18181b;
    }

    h1 {
      margin: 0 0 14px;
      font-size: 24px;
      line-height: 1.25;
    }

    p {
      margin: 0 0 14px;
      color: #a1a1aa;
      font-size: 15px;
      line-height: 1.8;
    }

    .demo-text {
      margin-top: 18px;
      padding: 18px;
      border: 1px solid rgba(255, 255, 255, .09);
      border-radius: 12px;
      background: #0f0f11;
    }

    .demo-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 20px;
    }

    button {
      height: 38px;
      padding: 0 14px;
      border: 1px solid rgba(255, 255, 255, .16);
      border-radius: 9px;
      background: #27272a;
      color: #f4f4f5;
      font: inherit;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }

    button.primary {
      border: none;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff;
    }
  </style>
</head>

<body>
  <main>
    <section class="surface">
      <h1>Floating Notes</h1>
      <p>这是普通页面形态，右下角悬浮按钮会打开抽屉。PC 端从右侧滑入，移动端从底部上滑。</p>
      <p>选中下面任意文字，文字下方会出现工具条，可直接问 AI、复制，或保存到当前 Worker 后端的笔记。</p>

      <div class="demo-text">
        <p>划词笔记适合把网页中的片段快速沉淀下来。选中文字后，工具条会贴近选区下方出现；点击“笔记”会触发参考脚本里的虫洞动效并写入后端。</p>
        <p>AI 页保留参考脚本的双页抽屉机制，回答内容可以通过“存为笔记”进入笔记页。笔记页的数据仍然来自当前 y 工程的 /notes API。</p>
      </div>

      <div class="demo-actions">
        <button class="primary" type="button" data-floating-notes-trigger>打开笔记抽屉</button>
      </div>
    </section>
  </main>

  <script src="/embed/floating-notes-widget.js" data-title="笔记"></script>
</body>

</html>
