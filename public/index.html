<!DOCTYPE html>
<html lang="zh-CN">

<head>

    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Floating Notes</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        button,
        input,
        textarea,
        [role="button"] {
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        button:focus,
        input:focus,
        textarea:focus,
        [role="button"]:focus {
            outline: none;
        }

        body {

            font-family:
                -apple-system,
                BlinkMacSystemFont,
                "PingFang SC",
                sans-serif;

            background: white;
        }

        /* 浮球 */

        .float-btn {

            position: fixed;

            left: 20px;
            top: 20px;

            width: 56px;
            height: 56px;

            border-radius: 50%;

            background: #111;
            color: white;

            display: flex;
            align-items: center;
            justify-content: center;

            cursor: pointer;

            z-index: 1001;

            font-size: 14px;
            font-weight: 600;

            box-shadow:
                0 10px 30px rgba(0, 0, 0, 0.2);

            user-select: none;
        }

        .float-icon {

            width: 30px;
            height: 30px;

            display: block;
        }

        /* 蒙层 */

        .overlay {

            position: fixed;
            inset: 0;

            background: rgba(0, 0, 0, 0.45);

            backdrop-filter: blur(4px);

            opacity: 0;
            pointer-events: none;

            transition: 0.25s;

            z-index: 999;
        }

        .overlay.show {

            opacity: 1;
            pointer-events: auto;
        }

        /* panel */

        .panel {

            position: fixed;

            left: 20px;
            top: 90px;

            width: 50vw;
            height: 50vh;

            background: rgba(255, 255, 255, 0.96);

            border-radius: 20px;

            overflow: hidden;

            box-shadow:
                0 20px 60px rgba(0, 0, 0, 0.2);

            transform: translateY(-20px);

            opacity: 0;
            pointer-events: none;

            transition: 0.25s;

            z-index: 1000;
        }

        .panel.show {

            transform: translateY(0);

            opacity: 1;
            pointer-events: auto;
        }

        /* list */

        #noteList {

            position: absolute;
            inset: 0;

            width: 100%;
            height: 50vh;

            background: #f5f5f5;

            display: flex;
            flex-direction: column;
            overflow-y: auto;
            overflow-x: hidden;
            overscroll-behavior: contain;
            touch-action: pan-y;
            transform: translateX(0);
            transition:
                transform 0.3s ease,
                opacity 0.3s ease;
            will-change: transform, opacity;
        }

        /* swipe */

        .swipe-item {

            position: relative;

            width: 100%;
            height: 72px;
            flex: 0 0 72px;

            overflow: hidden;

            border-bottom: 1px solid #ececec;

            background: #f5f5f5;
            touch-action: pan-y;
        }

        /* actions */

        .actions {

            position: absolute;

            right: 0;
            top: 0;
            bottom: 0;

            display: flex;
        }

        /* 左滑按钮 */

        .copy-btn,
        .delete-btn {

            width: 72px;

            display: flex;
            align-items: center;
            justify-content: center;

            color: white;

            font-size: 14px;
            font-weight: 600;

            cursor: pointer;

            user-select: none;
        }

        .copy-btn {
            background: #34c759;
        }

        .delete-btn {
            background: #ff3b30;
        }

        .copy-btn:active,
        .delete-btn:active {
            filter: brightness(0.92);
        }

        /* item */

        .note-item {

            position: relative;

            width: 100%;
            height: 72px;

            background: white;

            padding: 14px 18px;

            cursor: pointer;

            transition: transform 0.25s ease;

            user-select: none;
        }

        .note-item.returning {
            transition: transform 0.3s ease;
        }

        .toast {
            position: fixed;
            left: 50%;
            top: 28px;
            transform: translate(-50%, -10px);
            padding: 8px 14px;
            border-radius: 999px;
            background: rgba(17, 17, 17, 0.88);
            color: white;
            font-size: 13px;
            font-weight: 600;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease, transform 0.2s ease;
            z-index: 3000;
        }

        .toast.show {
            opacity: 1;
            transform: translate(-50%, 0);
        }

        /* title */

        .note-title {

            font-size: 18px;
            font-weight: 700;

            color: #111;

            margin-bottom: 6px;

            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* desc */

        .note-desc {

            font-size: 13px;

            color: #888;

            line-height: 1.5;

            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;

        }

        /* add */

        .add-item {

            height: 72px;
            flex: 0 0 72px;

            background: #f5f5f5;

            display: flex;
            align-items: center;
            justify-content: center;

            cursor: pointer;
        }

        .add-circle {

            width: 28px;
            height: 28px;

            display: flex;
            align-items: center;
            justify-content: center;

            transition: 0.2s;
        }

        .add-icon {
            width: 28px;
            height: 28px;
            display: block;
        }

        .add-item:hover .add-circle {

            opacity: 0.78;
        }

        /* detail */

        .detail-page {

            position: absolute;
            inset: 0;
            height: 100%;
            background: white;

            display: flex;
            flex-direction: column;
            pointer-events: none;
            transform: translateX(100%);
            transition:
                transform 0.3s ease,
                opacity 0.3s ease;
            will-change: transform, opacity;
        }

        .panel.detail-open #noteList {

            pointer-events: none;
            transform: translateX(-28%);
            opacity: 0.82;
        }

        .panel.detail-open .detail-page {

            pointer-events: auto;
            transform: translateX(0);
        }

        /* header */

        .detail-header {

            height: 64px;

            border-bottom: 1px solid #ececec;

            display: flex;
            align-items: center;

            gap: 12px;

            padding: 0 16px;
        }

        /* back */

        .back-btn {

            width: 34px;
            height: 34px;

            border-radius: 10px;

            background: #f3f3f3;

            display: flex;
            align-items: center;
            justify-content: center;

            cursor: pointer;
        }

        /* title input */

        .detail-title {

            flex: 1;

            border: none;
            outline: none;

            font-size: 20px;
            font-weight: 700;
        }

        /* save */

        .save-btn {

            padding: 8px 14px;

            border-radius: 10px;

            background: #111;

            color: white;

            cursor: pointer;

            font-size: 13px;
        }

        /* content */

        .detail-content {

            flex: 1;

            border: none;
            outline: none;

            resize: none;

            padding: 20px;

            font-size: 16px;

            line-height: 1.8;
        }

        /* 手机 */

        @media (max-width:768px) {

            .panel {

                width: calc(100vw - 40px);
            }
        }
    </style>

</head>

<body>

    <div class="float-btn" id="floatBtn" role="button" aria-label="打开笔记" tabindex="0">
        <img class="float-icon" src="/edit_light.svg" alt="" aria-hidden="true" />
    </div>

    <div class="overlay" id="overlay"></div>

    <div class="toast" id="toast"></div>

    <div class="panel" id="panel">

        <div id="noteList"></div>

        <div class="detail-page" id="detailPage">

            <div class="detail-header">

                <div class="back-btn" onclick="closeDetail()">
                    ←
                </div>

                <input class="detail-title" id="detailTitle" placeholder="输入标题" />

                <div class="save-btn" onclick="saveNote()">
                    保存
                </div>

            </div>

            <textarea class="detail-content" id="detailContent" placeholder="输入内容..."></textarea>

        </div>

    </div>

    <script>

        /* API */

        const API =
            window.location.origin;

        /* 数据 */

        let notes = [];

        let currentIndex = null;

        /* dom */

        const panel =
            document.getElementById("panel");

        const overlay =
            document.getElementById("overlay");

        const noteList =
            document.getElementById("noteList");

        const detailPage =
            document.getElementById("detailPage");

        const detailTitle =
            document.getElementById("detailTitle");

        const detailContent =
            document.getElementById("detailContent");

        const toast =
            document.getElementById("toast");

        let toastTimer = null;

        /* panel */

        let opened = false;

        document
            .getElementById("floatBtn")
            .addEventListener("click", () => {

                opened = !opened;

                if (opened) {

                    panel.classList.add("show");
                    overlay.classList.add("show");

                } else {

                    panel.classList.remove("show");
                    closeDetail();
                    overlay.classList.remove("show");
                }
            });

        overlay.addEventListener("click", () => {

            opened = false;

            panel.classList.remove("show");
            closeDetail();
            overlay.classList.remove("show");
        });

        /* fetch */

        async function fetchNotes() {

            const res =
                await fetch(`${API}/notes`);

            notes = await res.json();

            renderNotes();
        }

        /* render */

        function renderNotes() {

            noteList.innerHTML = "";

            notes.forEach((note, index) => {

                const item =
                    document.createElement("div");

                item.className =
                    "swipe-item";

                const actions =
                    document.createElement("div");

                actions.className =
                    "actions";

                const copyBtn =
                    document.createElement("div");

                copyBtn.className =
                    "copy-btn";

                copyBtn.textContent =
                    "复制";

                const deleteBtn =
                    document.createElement("div");

                deleteBtn.className =
                    "delete-btn";

                deleteBtn.textContent =
                    "删除";

                const noteItem =
                    document.createElement("div");

                noteItem.className =
                    "note-item";

                const noteTitle =
                    document.createElement("div");

                noteTitle.className =
                    "note-title";

                noteTitle.textContent =
                    note.title || "未命名";

                const noteDesc =
                    document.createElement("div");

                noteDesc.className =
                    "note-desc";

                noteDesc.textContent =
                    note.content || "";

                actions.append(copyBtn, deleteBtn);
                noteItem.append(noteTitle, noteDesc);
                item.append(actions, noteItem);

                noteList.appendChild(item);

                /* detail */

                noteItem.onclick = () => {

                    if (isSwipedOpen(noteItem)) {

                        resetSwipeNow(noteItem);
                        return;
                    }

                    openDetail(index);
                };

                /* delete */

                deleteBtn.onclick = () => {

                    deleteNote(index, noteItem);
                };

                /* copy */

                copyBtn.onclick = () => {

                    copyNote(index, noteItem);
                };

                /* swipe */

                addSwipe(noteItem);
            });

            /* add */

            const add =
                document.createElement("div");

            add.className = "add-item";

            const addCircle =
                document.createElement("div");

            addCircle.className =
                "add-circle";

            const addIcon =
                document.createElement("img");

            addIcon.className =
                "add-icon";
            addIcon.src =
                "/roundaddlight.svg";
            addIcon.alt =
                "";
            addIcon.setAttribute("aria-hidden", "true");

            addCircle.appendChild(addIcon);
            add.appendChild(addCircle);

            addCircle.onclick = createNote;

            noteList.appendChild(add);
        }

        /* swipe */

        function getTranslateX(noteItem) {

            const match =
                noteItem.style.transform.match(/translateX\((-?\d+(?:\.\d+)?)px\)/);

            return match
                ? Number(match[1])
                : 0;
        }

        function isSwipedOpen(noteItem) {

            return getTranslateX(noteItem) < 0;
        }

        function addSwipe(note) {

            let startX = 0;
            let startY = 0;
            let currentX = 0;
            let startTranslateX = 0;
            let translateX = 0;

            let isSwiping = false;
            let isVerticalScroll = false;

            /* 滑动阈值 */

            const threshold = 15;

            note.addEventListener("touchstart", (e) => {

                startX =
                    e.touches[0].clientX;
                startY =
                    e.touches[0].clientY;

                currentX = startX;
                startTranslateX = getTranslateX(note);
                translateX = startTranslateX;

                isSwiping = false;
                isVerticalScroll = false;
            }, { passive: true });

            note.addEventListener("touchmove", (e) => {

                currentX =
                    e.touches[0].clientX;

                const diff =
                    currentX - startX;
                const diffY =
                    e.touches[0].clientY - startY;
                let nextTranslateX =
                    startTranslateX + diff;

                if (isVerticalScroll) {

                    return;
                }

                if (!isSwiping && Math.abs(diffY) > threshold && Math.abs(diffY) > Math.abs(diff)) {

                    isVerticalScroll = true;
                    return;
                }

                /* 横向滑动超过阈值才算 swipe */

                if (!isSwiping && Math.abs(diff) > threshold && Math.abs(diff) > Math.abs(diffY)) {

                    isSwiping = true;
                }

                /* 不是滑动 */

                if (!isSwiping) {
                    return;
                }

                e.preventDefault();

                if (nextTranslateX > 0) {

                    nextTranslateX = 0;
                }

                if (nextTranslateX < -144) {

                    nextTranslateX = -144;
                }

                translateX = nextTranslateX;

                note.style.transform =
                    `translateX(${translateX}px)`;
            }, { passive: false });

            note.addEventListener("touchend", () => {

                /* 不是滑动 */

                if (!isSwiping) {
                    return;
                }

                if (translateX < -60) {

                    translateX = -144;
                    note.style.transform =
                        `translateX(-144px)`;

                } else {

                    translateX = 0;
                    note.style.transform =
                        `translateX(0px)`;
                }
            });
        }

        /* open */

        function showDetailPage() {

            detailPage.classList.add("show");

            requestAnimationFrame(() => {

                requestAnimationFrame(() => {

                    panel.classList.add("detail-open");
                });
            });
        }

        function openDetail(index) {

            currentIndex = index;

            detailTitle.value =
                notes[index].title;

            detailContent.value =
                notes[index].content;

            showDetailPage();
        }

        /* create */

        function createNote() {

            currentIndex = null;

            detailTitle.value = "";
            detailContent.value = "";

            showDetailPage();
        }

        /* close */

        function closeDetail() {

            detailPage.classList.remove("show");
            panel.classList.remove("detail-open");
        }

        /* save */

        async function saveNote() {

            const title =
                detailTitle.value.trim();

            const content =
                detailContent.value.trim();

            if (!title) {

                alert("请输入标题");
                return;
            }

            if (currentIndex === null) {

                await fetch(`${API}/notes`, {

                    method: "POST",

                    headers: {
                        "Content-Type": "application/json"
                    },

                    body: JSON.stringify({

                        title,
                        content
                    })
                });

            } else {

                const note =
                    notes[currentIndex];

                await fetch(
                    `${API}/notes/${note.id}`,
                    {

                        method: "PUT",

                        headers: {
                            "Content-Type": "application/json"
                        },

                        body: JSON.stringify({

                            title,
                            content
                        })
                    }
                );
            }

            await fetchNotes();

            closeDetail();
        }

        /* delete */

        async function deleteNote(index, noteItem) {

            const note =
                notes[index];

            await fetch(
                `${API}/notes/${note.id}`,
                {
                    method: "DELETE"
                }
            );

            showToast("✅ 删除成功");
            await fetchNotes();
        }

        /* copy */

        async function copyNote(index, noteItem) {

            const note =
                notes[index];

            await writeClipboard(note.content || "");
            showToast("✅ 复制成功");
            await resetSwipeNow(noteItem);
        }

        function resetSwipeNow(noteItem) {

            return new Promise((resolve) => {

                noteItem.classList.add("returning");
                noteItem.style.transform =
                    "translateX(0px)";

                window.setTimeout(() => {

                    noteItem.classList.remove("returning");
                    resolve();
                }, 300);
            });
        }

        function showToast(message) {

            toast.textContent =
                message;

            toast.classList.add("show");

            if (toastTimer) {

                window.clearTimeout(toastTimer);
            }

            toastTimer =
                window.setTimeout(() => {

                    toast.classList.remove("show");
                }, 1400);
        }

        async function writeClipboard(text) {

            if (navigator.clipboard && window.isSecureContext) {

                await navigator.clipboard.writeText(text);
                return;
            }

            const textarea =
                document.createElement("textarea");

            textarea.value =
                text;

            textarea.setAttribute("readonly", "");
            textarea.style.position =
                "fixed";
            textarea.style.top =
                "-1000px";

            document.body.appendChild(textarea);
            textarea.focus();
            textarea.select();

            document.execCommand("copy");
            textarea.remove();
        }

        /* init */

        fetchNotes();

    </script>

</body>

</html>
